name: build-macos

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          rm -rf Audite.xcodeproj
          xcodegen generate

      - name: Resolve Dependencies
        run: |
          xcodebuild \
            -scheme Audite \
            -derivedDataPath build \
            -resolvePackageDependencies

      - name: Build (Release)
        run: |
          xcodebuild \
            -scheme Audite \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=NO \
            build

      - name: Zip .app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Audite.app Audite.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audite-macOS
          path: build/Build/Products/Release/Audite.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Audite.zip
