name: Audite
options:
  bundleIdPrefix: com.zachatrocity
  deploymentTarget:
    macOS: '14.0'
  xcodeVersion: '15.4'
  projectFormat: '15.4'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.zachatrocity.audite
    MARKETING_VERSION: 0.0.1
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Audite
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "Audite needs access to the microphone for recording."
    INFOPLIST_KEY_NSCalendarsUsageDescription: "Audite can read Calendar events to name recordings."
    SWIFT_VERSION: 6.0

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: '0.12.4'

targets:
  Audite:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: FluidAudio
    entitlements:
      path: Sources/Audite.entitlements
      properties:
        com.apple.security.device.audio-input: true
    settings:
      base:
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Zach"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
    scheme:
      testTargets: []
